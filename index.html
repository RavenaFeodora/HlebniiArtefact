<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Золотой Батон: Шепот Стен v1.4</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #ffd700; font-size: 20px; z-index: 50; text-shadow: 2px 2px #000; pointer-events: none; display: none; }
        
        #main-menu {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('1774346868433.png') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        #menu-content {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border: 2px solid #ffd700;
            text-align: center;
            border-radius: 10px;
        }

        #dialog-overlay {
            position: fixed;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 90%; max-width: 800px;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #ffd700;
            padding: 20px;
            display: none;
            z-index: 150;
            flex-direction: row;
            align-items: center;
            gap: 20px;
            color: white;
        }

        #dialog-avatar {
            width: 100px; height: 100px;
            border: 2px solid #ffd700;
            background: url('InShot_20260324_130841446.png') no-repeat center;
            background-size: cover;
            flex-shrink: 0;
        }

        #dialog-text { font-size: 18px; line-height: 1.4; }

        button { background: #440000; color: #ffd700; border: 1px solid #ffd700; padding: 15px 30px; font-size: 18px; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        button:hover { background: #660000; }

        #joystick-ui { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 2px solid #ffd700; z-index: 60; display: none; }
        #knob { position: absolute; top: 30px; left: 30px; width: 40px; height: 40px; background: #ffd700; border-radius: 50%; opacity: 0.6; }
        
        #vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 45;
            background: radial-gradient(circle, transparent 10%, black 120%);
            transition: background 0.8s;
        }

        #grain-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 46;
            opacity: 0;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_filmgrain.png');
            animation: grain 0.1s steps(10) infinite;
            mix-blend-mode: overlay;
        }

        @keyframes grain {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-1%, -1%); }
            30% { transform: translate(1%, 1%); }
            50% { transform: translate(-0.5%, 0.5%); }
            70% { transform: translate(0.5%, -0.5%); }
        }
    </style>
</head>
<body>

    <div id="main-menu">
        <div id="menu-content">
            <h1 style="color: #ffd700; margin-bottom: 10px;">version 1.5</h1>
            <p style="color: #fff;">by Kukusa</p>
            <button id="start-btn">НОВАЯ ИГРА</button>
        </div>
    </div>

    <div id="dialog-overlay">
        <div id="dialog-avatar"></div>
        <div id="dialog-content">
            <div style="color: #ffd700; font-weight: bold; margin-bottom: 5px;">Алекс Леон:</div>
            <div id="dialog-text"></div>
            <button id="close-dialog-btn" style="padding: 5px 15px; font-size: 14px; margin-top: 10px;">ДАЛЕЕ</button>
        </div>
    </div>

    <div id="ui">
        АРТЕФАКТЫ: <span id="count">0</span> / 10 <br>
        ЖИЗНИ: <span id="health">2</span>
    </div>
    <div id="grain-layer"></div>
    <div id="vignette"></div>
    <div id="joystick-ui"><div id="knob"></div></div>

    <audio id="menu-music" loop src="003. Restroom intro - Mary's Letter.mp3"></audio>
    <audio id="bg-music" loop src="abandoned-prison.mp3"></audio>
    <audio id="scream-snd" src="Крик существа который зовет из подвала.mp3"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const textureLoader = new THREE.TextureLoader();
        const wallTex = textureLoader.load('5655360f-0c19-4fbd-9fdd-d7aa00d79c7e.jpeg');
        const floorTex = textureLoader.load('i (1).jpeg');
        const loafTex = textureLoader.load('InShot_20260324_114723215.png');
        const hallTex = textureLoader.load('InShot_20260324_120003547.png');

        let scene, camera, renderer, clock, marevoMat, renderTarget, postScene, postCam;
        let score = 0, health = 2, artifacts = [], walls = [], ghostSprites = [];
        let monster, mixer, isInvulnerable = false;
        let moveDir = { x: 0, y: 0 }, rotation = { x: 0, y: 0 };
        let marevoTarget = 0, isHallucinating = false;
        let flashlight;
        const playerHeight = 1.6;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            scene.fog = new THREE.FogExp2(0x000000, 0.22);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, playerHeight, 5);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            renderTarget = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
            postScene = new THREE.Scene();
            postCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            
            marevoMat = new THREE.ShaderMaterial({
                uniforms: { tDiffuse: {value: null}, time: {value: 0}, intensity: {value: 0}, aberration: {value: 0} },
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
                fragmentShader: `
                    uniform sampler2D tDiffuse; uniform float time; uniform float intensity; uniform float aberration; varying vec2 vUv;
                    void main() {
                        vec2 uv = vUv;
                        if(intensity > 0.0) {
                            uv.x += sin(uv.y * 12.0 + time * 2.5) * 0.006 * intensity;
                            uv.y += cos(uv.x * 12.0 + time * 2.5) * 0.006 * intensity;
                        }
                        float r = texture2D(tDiffuse, uv + vec2(aberration * 0.008, 0.0)).r;
                        float g = texture2D(tDiffuse, uv).g;
                        float b = texture2D(tDiffuse, uv - vec2(aberration * 0.008, 0.0)).b;
                        gl_FragColor = vec4(r, g, b, 1.0);
                    }
                `
            });
            postScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), marevoMat));

            clock = new THREE.Clock();
            scene.add(new THREE.AmbientLight(0xffffff, 0.01));

            flashlight = new THREE.SpotLight(0xffffff, 4.5);
            flashlight.angle = Math.PI / 5;
            flashlight.penumbra = 0.2;
            flashlight.decay = 1.8;
            flashlight.distance = 45;
            
            const flashlightTarget = new THREE.Object3D();
            flashlightTarget.position.set(0, 0, -1);
            camera.add(flashlightTarget);
            flashlight.target = flashlightTarget;
            camera.add(flashlight);
            scene.add(camera);

            floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
            floorTex.repeat.set(40, 40);
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(160, 160), new THREE.MeshStandardMaterial({map: floorTex}));
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            createMaze();
            spawnItems();
            loadMonster();
            setupControls();

            function animate() {
                requestAnimationFrame(animate);
                const dt = clock.getDelta();
                const time = clock.getElapsedTime();

                if (mixer) mixer.update(dt);

                // Движение игрока
                if (moveDir.x !== 0 || moveDir.y !== 0) {
                    const speed = 4.2 * dt;
                    const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                    const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
                    forward.y = 0; right.y = 0;
                    forward.normalize(); right.normalize();
                    
                    const moveVector = new THREE.Vector3().addScaledVector(forward, -moveDir.y * speed).addScaledVector(right, moveDir.x * speed);
                    const nextPos = camera.position.clone().add(moveVector);

                    let collision = false;
                    for (let w of walls) {
                        if (nextPos.distanceTo(new THREE.Vector3(w.position.x, playerHeight, w.position.z)) < 2.0) {
                            collision = true; break;
                        }
                    }
                    if (!collision) camera.position.copy(nextPos);
                }

                // Визуальное покачивание
                const bob = Math.sin(time * 2.5) * 0.015;
                const sway = Math.cos(time * 1.8) * 0.008;
                camera.position.y = playerHeight + (moveDir.x !== 0 || moveDir.y !== 0 ? bob * 2 : bob);
                camera.rotation.set(rotation.x + sway, rotation.y, sway, 'YXZ');

                // Логика монстра (Ромпера)
                if (monster) {
                    const mDir = new THREE.Vector3().subVectors(camera.position, monster.position).normalize();
                    mDir.y = 0;
                    monster.position.addScaledVector(mDir, 1.4 * dt); 
                    monster.lookAt(camera.position.x, 0, camera.position.z);
                    
                    // Урон при контакте
                    if (monster.position.distanceTo(camera.position) < 1.5 && !isInvulnerable) {
                        takeDamage();
                    }
                }

                // Сбор батонов
                artifacts.forEach((a, i) => {
                    a.rotation.y += dt;
                    a.position.y = 0.7 + Math.sin(time * 3 + i) * 0.12;
                    if(camera.position.distanceTo(a.position) < 1.3) {
                        scene.remove(a); artifacts.splice(i, 1);
                        score++; document.getElementById('count').innerText = score;
                        if(score >= 10) finishGame();
                    }
                });

                ghostSprites.forEach(ghost => {
                    ghost.lookAt(camera.position);
                    ghost.material.opacity = 0.4 + Math.sin(time * 8) * 0.2;
                });

                // Шейдеры и рендер
                marevoMat.uniforms.time.value = time;
                marevoMat.uniforms.intensity.value += (marevoTarget - marevoMat.uniforms.intensity.value) * 0.05;
                marevoMat.uniforms.aberration.value = isHallucinating ? 1.0 : 0;
                
                renderer.setRenderTarget(renderTarget);
                renderer.render(scene, camera);
                renderer.setRenderTarget(null);
                marevoMat.uniforms.tDiffuse.value = renderTarget.texture;
                renderer.render(postScene, postCam);
            }
            animate();
            setInterval(triggerAnomaly, 20000);
        }

        function loadMonster() {
            const loader = new THREE.GLTFLoader();
            loader.load('silent_hill_1_monsters_-_romper.glb', (gltf) => {
                monster = gltf.scene;
                monster.scale.set(1.5, 1.5, 1.5);
                monster.position.set(25, 0, 25);
                scene.add(monster);

                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(monster);
                    mixer.clipAction(gltf.animations[0]).play();
                }
            }, undefined, (e) => console.error("Ошибка загрузки монстра", e));
        }

        function takeDamage() {
            health--;
            document.getElementById('health').innerText = health;
            
            if (health <= 0) {
                gameOver();
            } else {
                isInvulnerable = true;
                marevoTarget = 15.0; // Искажение экрана при ударе
                
                const vignette = document.getElementById('vignette');
                vignette.style.background = "radial-gradient(circle, transparent 2%, #440000 140%)";
                
                setTimeout(() => {
                    isInvulnerable = false;
                    marevoTarget = 0;
                    vignette.style.background = "radial-gradient(circle, transparent 10%, black 120%)";
                }, 2000); // 2 секунды неуязвимости
            }
        }

        function gameOver() {
            const menu = document.getElementById('main-menu');
            menu.innerHTML = "<div id='menu-content'><h1 style='color:red'>ТЫ СТАЛ ХЛЕБОМ</h1><p>Ромпер настиг тебя.</p><button onclick='location.reload()'>ПОПРОБОВАТЬ СНОВА</button></div>";
            menu.style.display = 'flex';
            document.getElementById('ui').style.display = 'none';
        }

        function createMaze() {
            const wallGeo = new THREE.BoxGeometry(4, 5, 1.2);
            const wallMat = new THREE.MeshStandardMaterial({map: wallTex});
            for(let i=0; i<55; i++) {
                const wall = new THREE.Mesh(wallGeo, wallMat);
                wall.position.set((Math.floor(Math.random()*16)-8)*4, 2.5, (Math.floor(Math.random()*16)-8)*4);
                wall.rotation.y = Math.random() > 0.5 ? 0 : Math.PI/2;
                if(wall.position.length() < 8) continue;
                scene.add(wall);
                walls.push(wall);
            }
        }

        function spawnItems() {
            const mat = new THREE.MeshStandardMaterial({map: loafTex, transparent: true, emissive: 0x554400});
            for(let i=0; i<10; i++) {
                const loaf = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.6, 0.6), mat);
                loaf.position.set((Math.random()-0.5)*80, 0.8, (Math.random()-0.5)*80);
                scene.add(loaf);
                artifacts.push(loaf);
            }
        }

        function triggerAnomaly() {
            if (document.getElementById('dialog-overlay').style.display === 'flex') return;
            isHallucinating = true;
            marevoTarget = 7.0;
            document.getElementById('grain-layer').style.opacity = "0.4";
            document.getElementById('vignette').style.background = "radial-gradient(circle, transparent 2%, #330044 140%)";
            
            const scream = document.getElementById('scream-snd');
            scream.currentTime = 0; scream.play().catch(()=>{});
            
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: hallTex, transparent: true, opacity: 0 }));
            sprite.position.set(camera.position.x + (Math.random()-0.5)*15, 1.5, camera.position.z + (Math.random()-0.5)*15);
            sprite.scale.set(3.5, 4.5, 1);
            scene.add(sprite);
            ghostSprites.push(sprite);

            setTimeout(() => {
                isHallucinating = false;
                marevoTarget = 0;
                document.getElementById('grain-layer').style.opacity = "0";
                document.getElementById('vignette').style.background = "radial-gradient(circle, transparent 10%, black 120%)";
                scene.remove(sprite);
                ghostSprites = ghostSprites.filter(s => s !== sprite);
            }, 15000);
        }

        function setupControls() {
            const joy = document.getElementById('joystick-ui'), knob = document.getElementById('knob');
            let joyActive = false, lastX, lastY;
            document.addEventListener('touchstart', e => {
                const t = e.touches[0];
                if(t.clientX < window.innerWidth/2) joyActive = true;
                else { lastX = t.clientX; lastY = t.clientY; }
            });
            document.addEventListener('touchmove', e => {
                const t = e.touches[0];
                if(t.clientX < window.innerWidth/2 && joyActive) {
                    const rect = joy.getBoundingClientRect();
                    let dx = t.clientX - (rect.left + 50), dy = t.clientY - (rect.top + 50);
                    const d = Math.sqrt(dx*dx+dy*dy);
                    if(d > 40) { dx *= 40/d; dy *= 40/d; }
                    knob.style.transform = `translate(${dx}px, ${dy}px)`;
                    moveDir = {x: dx/40, y: dy/40};
                } else if(lastX !== undefined) {
                    rotation.y -= (t.clientX - lastX) * 0.007;
                    rotation.x = Math.max(-1.1, Math.min(1.1, rotation.x - (t.clientY - lastY) * 0.007));
                    lastX = t.clientX; lastY = t.clientY;
                }
            });
            document.addEventListener('touchend', () => {
                joyActive = false; moveDir = {x:0, y:0};
                knob.style.transform = `translate(0,0)`; lastX = undefined;
            });
        }

        function finishGame() {
            document.getElementById('ui').style.display = 'none';
            document.getElementById('joystick-ui').style.display = 'none';
            const menu = document.getElementById('main-menu');
            menu.innerHTML = "<div id='menu-content'><h1 style='color:gold'>ПОБЕДА</h1><p>Батоны собраны.</p><button onclick='location.reload()'>В МЕНЮ</button></div>";
            menu.style.display = 'flex';
        }

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('menu-music').pause();
            document.getElementById('main-menu').style.display = 'none';
            showDialog("Отлично! Я нашел особняк хлебного демона! Долгие поиски окончены, осталось получить золотые батоны!");
        };

        function showDialog(text) {
            const dialog = document.getElementById('dialog-overlay');
            const dialogText = document.getElementById('dialog-text');
            dialogText.innerText = "";
            dialog.style.display = 'flex';
            let i = 0;
            const timer = setInterval(() => {
                dialogText.innerText += text[i++];
                if (i >= text.length) clearInterval(timer);
            }, 50);

            document.getElementById('close-dialog-btn').onclick = () => {
                dialog.style.display = 'none';
                document.getElementById('ui').style.display = 'block';
                document.getElementById('joystick-ui').style.display = 'block';
                document.getElementById('bg-music').play().catch(()=>{});
                init();
            };
        }

        window.addEventListener('load', () => document.getElementById('menu-music').play().catch(()=>{}));
        window.addEventListener('resize', () => {
            if(camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
