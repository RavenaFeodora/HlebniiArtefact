<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Золотой Батон: Шепот Стен</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #ffd700; font-size: 20px; z-index: 50; text-shadow: 2px 2px #000; pointer-events: none; }
        #joystick-ui { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 2px solid #ffd700; z-index: 60; }
        #knob { position: absolute; top: 30px; left: 30px; width: 40px; height: 40px; background: #ffd700; border-radius: 50%; opacity: 0.6; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px; box-sizing: border-box; }
        button { background: #440000; color: #ffd700; border: 1px solid #ffd700; padding: 15px 30px; font-size: 18px; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        
        #vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 45;
            background: radial-gradient(circle, transparent 10%, black 120%);
            transition: background 1.5s;
        }

        #grain-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 46;
            opacity: 0;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_filmgrain.png');
            animation: grain 0.1s steps(10) infinite;
            mix-blend-mode: overlay;
        }

        @keyframes grain {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-1%, -1%); }
            30% { transform: translate(1%, 1%); }
            50% { transform: translate(-0.5%, 0.5%); }
            70% { transform: translate(0.5%, -0.5%); }
        }
    </style>
</head>
<body>

    <div id="ui">АРТЕФАКТЫ: <span id="count">0</span> / 10</div>
    <div id="grain-layer"></div>
    <div id="vignette"></div>
    <div id="joystick-ui"><div id="knob"></div></div>

    <div id="overlay">
        <h1 style="color: #ff0000">ПРОКЛЯТЫЙ ДОМ</h1>
        <p>Собери 10 золотых батонов.<br>Опасайся растущих кристаллов и теней.</p>
        <button id="start-btn">ВОЙТИ</button>
    </div>

    <audio id="bg-music" loop src="abandoned-prison.mp3"></audio>
    <audio id="scream-snd" src="Крик существа который зовет из подвала.mp3"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const textureLoader = new THREE.TextureLoader();
        
        const wallTex = textureLoader.load('5655360f-0c19-4fbd-9fdd-d7aa00d79c7e.jpeg');
        const floorTex = textureLoader.load('i (1).jpeg');
        const loafTex = textureLoader.load('InShot_20260324_114723215.png');
        const hallTex = textureLoader.load('InShot_20260324_120003547.png');
        const art1 = textureLoader.load('InShot_20260324_120048253.jpg');
        const art2 = textureLoader.load('InShot_20260324_120027115.jpg');

        let scene, camera, renderer, clock, marevoMat;
        let score = 0, artifacts = [], walls = [], ghostSprites = [], crystals = [];
        let moveDir = { x: 0, y: 0 }, rotation = { x: 0, y: 0 };
        let marevoTarget = 0, isHallucinating = false;
        let flashlight;
        const playerHeight = 1.6;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            scene.fog = new THREE.FogExp2(0x000000, 0.22);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, playerHeight, 5);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            const renderTarget = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
            const postScene = new THREE.Scene();
            const postCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            marevoMat = new THREE.ShaderMaterial({
                uniforms: { 
                    tDiffuse: {value: null}, 
                    time: {value: 0}, 
                    intensity: {value: 0},
                    aberration: {value: 0}
                },
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
                fragmentShader: `
                    uniform sampler2D tDiffuse; uniform float time; uniform float intensity; uniform float aberration; varying vec2 vUv;
                    void main() {
                        vec2 uv = vUv;
                        if(intensity > 0.0) {
                            uv.x += sin(uv.y * 12.0 + time * 2.5) * 0.006 * intensity;
                            uv.y += cos(uv.x * 12.0 + time * 2.5) * 0.006 * intensity;
                        }
                        float r = texture2D(tDiffuse, uv + vec2(aberration * 0.008, 0.0)).r;
                        float g = texture2D(tDiffuse, uv).g;
                        float b = texture2D(tDiffuse, uv - vec2(aberration * 0.008, 0.0)).b;
                        gl_FragColor = vec4(r, g, b, 1.0);
                    }
                `
            });
            postScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), marevoMat));

            clock = new THREE.Clock();
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.01));

            flashlight = new THREE.SpotLight(0xffffff, 3.5);
            flashlight.angle = Math.PI / 8.5;
            flashlight.penumbra = 0.6;
            flashlight.decay = 2.2;
            flashlight.distance = 35;
            
            const flashlightTarget = new THREE.Object3D();
            flashlightTarget.position.set(0, 0, -1);
            camera.add(flashlightTarget);
            flashlight.target = flashlightTarget;
            camera.add(flashlight);
            scene.add(camera);

            floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
            floorTex.repeat.set(40, 40);
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(160, 160), new THREE.MeshStandardMaterial({map: floorTex}));
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            createMaze();
            spawnItems();
            setupControls();

            function animate() {
                requestAnimationFrame(animate);
                const dt = clock.getDelta();
                const time = clock.getElapsedTime();

                const bob = Math.sin(time * 2.5) * 0.015;
                const sway = Math.cos(time * 1.8) * 0.008;

                if (moveDir.x !== 0 || moveDir.y !== 0) {
                    const speed = 4.2 * dt;
                    const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                    const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
                    forward.y = 0; right.y = 0;
                    forward.normalize(); right.normalize();
                    
                    const moveVector = new THREE.Vector3().addScaledVector(forward, -moveDir.y * speed).addScaledVector(right, moveDir.x * speed);
                    const nextPos = camera.position.clone().add(moveVector);

                    let collision = false;
                    for (let w of walls) {
                        if (nextPos.distanceTo(new THREE.Vector3(w.position.x, playerHeight, w.position.z)) < 2.0) {
                            collision = true; break;
                        }
                    }
                    if (!collision) camera.position.copy(nextPos);
                }

                camera.position.y = playerHeight + (moveDir.x !== 0 || moveDir.y !== 0 ? bob * 2 : bob);
                camera.rotation.set(rotation.x + sway, rotation.y, sway, 'YXZ');

                artifacts.forEach((a, i) => {
                    a.rotation.y += dt;
                    a.position.y = 0.7 + Math.sin(time * 3 + i) * 0.12;
                    if(camera.position.distanceTo(a.position) < 1.3) {
                        scene.remove(a); artifacts.splice(i, 1);
                        score++; document.getElementById('count').innerText = score;
                        if(score >= 10) finishGame();
                    }
                });

                ghostSprites.forEach(ghost => {
                    ghost.lookAt(camera.position);
                    ghost.material.opacity = 0.4 + Math.sin(time * 8) * 0.2;
                });

                // Анимация роста кристаллов
                crystals.forEach(c => {
                    if (isHallucinating && c.scale.y < c.targetScale) {
                        c.scale.y += dt * 2.0;
                        c.scale.x += dt * 0.5;
                        c.scale.z += dt * 0.5;
                    } else if (!isHallucinating && c.scale.y > 0.01) {
                        c.scale.y -= dt * 3.0;
                        c.scale.x -= dt * 1.0;
                        c.scale.z -= dt * 1.0;
                    }
                });

                marevoMat.uniforms.time.value = time;
                marevoMat.uniforms.intensity.value += (marevoTarget - marevoMat.uniforms.intensity.value) * 0.05;
                marevoMat.uniforms.aberration.value = isHallucinating ? 1.0 : 0;
                
                renderer.setRenderTarget(renderTarget);
                renderer.render(scene, camera);
                renderer.setRenderTarget(null);
                marevoMat.uniforms.tDiffuse.value = renderTarget.texture;
                renderer.render(postScene, postCam);
            }
            animate();
            setInterval(triggerAnomaly, 20000);
        }

        function createMaze() {
            const wallGeo = new THREE.BoxGeometry(4, 5, 1.2);
            const wallMat = new THREE.MeshStandardMaterial({map: wallTex});
            for(let i=0; i<55; i++) {
                const wall = new THREE.Mesh(wallGeo, wallMat);
                wall.position.set((Math.floor(Math.random()*16)-8)*4, 2.5, (Math.floor(Math.random()*16)-8)*4);
                wall.rotation.y = Math.random() > 0.5 ? 0 : Math.PI/2;
                if(wall.position.length() < 8) continue;
                scene.add(wall);
                walls.push(wall);

                if(Math.random() > 0.6) {
                    const pic = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 2), new THREE.MeshBasicMaterial({map: Math.random()>0.5?art1:art2, side: THREE.DoubleSide}));
                    pic.position.set(0, 0, 0.61);
                    wall.add(pic);
                }
            }
        }

        function spawnItems() {
            const mat = new THREE.MeshStandardMaterial({map: loafTex, transparent: true, emissive: 0x554400});
            for(let i=0; i<10; i++) {
                const loaf = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.6, 0.6), mat);
                loaf.position.set((Math.random()-0.5)*80, 0.8, (Math.random()-0.5)*80);
                scene.add(loaf);
                artifacts.push(loaf);
            }
        }

        function createCrystals() {
            const crystalGeo = new THREE.ConeGeometry(0.3, 1, 4);
            const crystalMat = new THREE.MeshStandardMaterial({
                color: 0x8800ff,
                transparent: true,
                opacity: 0.7,
                emissive: 0x440088,
                metalness: 1,
                roughness: 0
            });

            // Очистка старых кристаллов
            crystals.forEach(c => scene.remove(c));
            crystals = [];

            for (let i = 0; i < 20; i++) {
                const c = new THREE.Mesh(crystalGeo, crystalMat);
                const angle = Math.random() * Math.PI * 2;
                const dist = 3 + Math.random() * 8;
                c.position.set(
                    camera.position.x + Math.sin(angle) * dist,
                    0,
                    camera.position.z + Math.cos(angle) * dist
                );
                c.rotation.x = (Math.random() - 0.5) * 0.5;
                c.rotation.z = (Math.random() - 0.5) * 0.5;
                c.scale.set(0.1, 0.01, 0.1);
                c.targetScale = 1.5 + Math.random() * 2;
                scene.add(c);
                crystals.push(c);
            }
        }

        function triggerAnomaly() {
            isHallucinating = true;
            marevoTarget = 7.0;
            document.getElementById('grain-layer').style.opacity = "0.4";
            document.getElementById('vignette').style.background = "radial-gradient(circle, transparent 2%, #330044 140%)";
            
            createCrystals();

            const scream = document.getElementById('scream-snd');
            scream.currentTime = 0; scream.play().catch(()=>{});

            const ghostMat = new THREE.SpriteMaterial({ map: hallTex, transparent: true, opacity: 0 });
            const sprite = new THREE.Sprite(ghostMat);
            const angle = rotation.y + (Math.random() - 0.5);
            sprite.position.set(
                camera.position.x + Math.sin(angle + Math.PI) * 7,
                1.5,
                camera.position.z + Math.cos(angle + Math.PI) * 7
            );
            sprite.scale.set(3.5, 4.5, 1);
            scene.add(sprite);
            ghostSprites.push(sprite);

            setTimeout(() => {
                isHallucinating = false;
                marevoTarget = 0;
                document.getElementById('grain-layer').style.opacity = "0";
                document.getElementById('vignette').style.background = "radial-gradient(circle, transparent 10%, black 120%)";
                scene.remove(sprite);
                const idx = ghostSprites.indexOf(sprite);
                if(idx > -1) ghostSprites.splice(idx, 1);
            }, 15000);
        }

        function setupControls() {
            const joy = document.getElementById('joystick-ui'), knob = document.getElementById('knob');
            let joyActive = false, lastX, lastY;

            document.addEventListener('touchstart', e => {
                const t = e.touches[0];
                if(t.clientX < window.innerWidth/2) joyActive = true;
                else { lastX = t.clientX; lastY = t.clientY; }
            }, {passive: false});

            document.addEventListener('touchmove', e => {
                const t = e.touches[0];
                if(t.clientX < window.innerWidth/2 && joyActive) {
                    const rect = joy.getBoundingClientRect();
                    let dx = t.clientX - (rect.left + 50), dy = t.clientY - (rect.top + 50);
                    const d = Math.sqrt(dx*dx+dy*dy);
                    if(d > 40) { dx *= 40/d; dy *= 40/d; }
                    knob.style.transform = `translate(${dx}px, ${dy}px)`;
                    moveDir = {x: dx/40, y: dy/40};
                } else {
                    if(lastX !== undefined) {
                        rotation.y -= (t.clientX - lastX) * 0.007;
                        rotation.x -= (t.clientY - lastY) * 0.007;
                        rotation.x = Math.max(-1.1, Math.min(1.1, rotation.x));
                    }
                    lastX = t.clientX; lastY = t.clientY;
                }
            }, {passive: false});

            document.addEventListener('touchend', () => {
                joyActive = false; moveDir = {x:0, y:0};
                knob.style.transform = `translate(0,0)`; lastX = undefined;
            });
        }

        function finishGame() {
            document.getElementById('overlay').innerHTML = "<h1 style='color:gold'>ПОБЕДА</h1><p>Ты собрал все батоны. Твой рассудок почти цел.</p><button onclick='location.reload()'>ЗАНОВО</button>";
            document.getElementById('overlay').style.display = 'flex';
        }

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('bg-music').play().catch(()=>{});
            init();
        };

        window.addEventListener('resize', () => {
            if(camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
