<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Золотой Батон: Изгнание</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #ffd700; font-size: 20px; z-index: 50; text-shadow: 2px 2px #000; pointer-events: none; }
        #joystick-ui { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 2px solid #ffd700; z-index: 60; }
        #knob { position: absolute; top: 30px; left: 30px; width: 40px; height: 40px; background: #ffd700; border-radius: 50%; opacity: 0.6; }
        
        /* Слой галлюцинаций - ИСПРАВЛЕНО: добавлено расширение .png */
        #hallucination-layer { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 90; 
            opacity: 0; 
            background-image: url('InShot_20260324_120003547.png');
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center; 
            transition: opacity 0.5s; 
        }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        button { background: #440000; color: #ffd700; border: 1px solid #ffd700; padding: 15px 30px; font-size: 18px; cursor: pointer; margin-top: 20px; }
        
        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 45;
            background: radial-gradient(circle, transparent 20%, black 90%);
        }
    </style>
</head>
<body>

    <div id="ui">АРТЕФАКТЫ: <span id="count">0</span> / 10</div>
    <div id="hallucination-layer"></div>
    <div id="vignette"></div>
    <div id="joystick-ui"><div id="knob"></div></div>

    <div id="overlay">
        <h1>ЗАТЕРЯННЫЙ В ДОМЕ</h1>
        <p>Соберите 10 золотых батонов.<br>Не дайте галлюцинациям свести вас с ума.</p>
        <button id="start-btn">НАЧАТЬ ПОИСК</button>
    </div>

    <!-- Аудио файлы -->
    <audio id="bg-music" loop src="abandoned-prison.mp3"></audio>
    <audio id="scream-snd" src="Крик существа который зовет из подвала.mp3"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const textureLoader = new THREE.TextureLoader();
        
        // Загрузка текстур
        const wallTex = textureLoader.load('5655360f-0c19-4fbd-9fdd-d7aa00d79c7e.jpeg');
        const floorTex = textureLoader.load('i (1).jpeg');
        const loafTex = textureLoader.load('InShot_20260324_114723215.png');
        const art1 = textureLoader.load('InShot_20260324_120048253.jpg');
        const art2 = textureLoader.load('InShot_20260324_120027115.jpg');

        let scene, camera, renderer, clock, marevoMat;
        let score = 0, artifacts = [], walls = [];
        let moveDir = { x: 0, y: 0 }, rotation = { x: 0, y: 0 };
        let marevoTarget = 0;
        let flashlight;
        let playerHeight = 1.6;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            scene.fog = new THREE.FogExp2(0x000000, 0.25);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            // Установка игрока на пол
            camera.position.set(0, playerHeight, 5);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Шейдер эффекта Марева
            const renderTarget = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
            const postScene = new THREE.Scene();
            const postCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            marevoMat = new THREE.ShaderMaterial({
                uniforms: { tDiffuse: {value: null}, time: {value: 0}, intensity: {value: 0} },
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
                fragmentShader: `
                    uniform sampler2D tDiffuse; uniform float time; uniform float intensity; varying vec2 vUv;
                    void main() {
                        vec2 uv = vUv;
                        if(intensity > 0.0) {
                            uv.x += sin(uv.y * 20.0 + time * 3.0) * 0.003 * intensity;
                            uv.y += cos(uv.x * 20.0 + time * 3.0) * 0.003 * intensity;
                        }
                        gl_FragColor = texture2D(tDiffuse, uv);
                    }
                `
            });
            postScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), marevoMat));

            clock = new THREE.Clock();
            
            // Освещение (Фонарик)
            const ambient = new THREE.AmbientLight(0xffffff, 0.01); 
            scene.add(ambient);

            flashlight = new THREE.SpotLight(0xffffff, 3);
            flashlight.position.set(0, 0, 0);
            flashlight.angle = Math.PI / 7;
            flashlight.penumbra = 0.4;
            flashlight.decay = 2;
            flashlight.distance = 30;
            
            const flashlightTarget = new THREE.Object3D();
            flashlightTarget.position.set(0, 0, -1);
            camera.add(flashlightTarget);
            flashlight.target = flashlightTarget;
            camera.add(flashlight);
            scene.add(camera);

            // Пол - ИСПРАВЛЕНО: Текстура теперь видна
            floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
            floorTex.repeat.set(50, 50);
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 200), 
                new THREE.MeshStandardMaterial({map: floorTex, roughness: 0.8})
            );
            floor.rotation.x = -Math.PI/2;
            floor.position.y = 0; // Пол на уровне 0
            scene.add(floor);

            createMaze();
            spawnItems();
            setupControls();

            function animate() {
                requestAnimationFrame(animate);
                const dt = clock.getDelta();
                const time = clock.getElapsedTime();

                // Физика перемещения и коллизии
                if (moveDir.x !== 0 || moveDir.y !== 0) {
                    const speed = 4.5 * dt;
                    const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                    const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
                    forward.y = 0; right.y = 0;
                    forward.normalize();
                    right.normalize();
                    
                    const moveVector = new THREE.Vector3();
                    moveVector.addScaledVector(forward, -moveDir.y * speed);
                    moveVector.addScaledVector(right, moveDir.x * speed);

                    const nextPos = camera.position.clone().add(moveVector);

                    // Проверка столкновений со стенами
                    let collision = false;
                    for (let w of walls) {
                        // Расстояние до центра стены
                        const dist = nextPos.distanceTo(new THREE.Vector3(w.position.x, playerHeight, w.position.z));
                        if (dist < 1.8) { // Радиус коллизии игрока
                            collision = true;
                            break;
                        }
                    }

                    if (!collision) {
                        camera.position.copy(nextPos);
                    }
                }

                // Игрок всегда на одной высоте
                camera.position.y = playerHeight;

                camera.rotation.set(rotation.x, rotation.y, 0, 'YXZ');

                // Предметы (батоны)
                artifacts.forEach((a, i) => {
                    a.rotation.y += dt;
                    a.position.y = 0.6 + Math.sin(time * 3 + i) * 0.1;
                    if(camera.position.distanceTo(a.position) < 1.2) {
                        scene.remove(a);
                        artifacts.splice(i, 1);
                        score++;
                        document.getElementById('count').innerText = score;
                        if(score >= 10) {
                            showOverlay("ПОБЕДА!", "Вы собрали все батоны и покинули проклятый дом.");
                        }
                    }
                });

                // Рендер постобработки
                marevoMat.uniforms.time.value = time;
                marevoMat.uniforms.intensity.value += (marevoTarget - marevoMat.uniforms.intensity.value) * 0.05;
                
                renderer.setRenderTarget(renderTarget);
                renderer.render(scene, camera);
                renderer.setRenderTarget(null);
                marevoMat.uniforms.tDiffuse.value = renderTarget.texture;
                renderer.render(postScene, postCam);
            }
            animate();
            
            // Интервал аномалий
            setInterval(triggerAnomaly, 25000);
        }

        function createMaze() {
            const wallGeo = new THREE.BoxGeometry(4, 5, 0.8);
            const wallMat = new THREE.MeshStandardMaterial({map: wallTex});
            
            // Генерируем стены лабиринта
            for(let i=0; i<50; i++) {
                const wall = new THREE.Mesh(wallGeo, wallMat);
                // Случайные позиции по сетке
                const x = (Math.floor(Math.random() * 20) - 10) * 4;
                const z = (Math.floor(Math.random() * 20) - 10) * 4;
                
                wall.position.set(x, 2.5, z);
                wall.rotation.y = Math.random() > 0.5 ? 0 : Math.PI/2;
                
                // Чтобы не заспавнилось на игроке
                if(wall.position.length() < 6) continue;
                
                scene.add(wall);
                walls.push(wall);

                // Картины на стенах
                if(Math.random() > 0.6) {
                    const picMat = new THREE.MeshBasicMaterial({map: Math.random() > 0.5 ? art1 : art2});
                    const pic = new THREE.Mesh(new THREE.PlaneGeometry(1.4, 1.8), picMat);
                    pic.position.set(0, 0, 0.41);
                    wall.add(pic);
                }
            }
        }

        function spawnItems() {
            const mat = new THREE.MeshStandardMaterial({map: loafTex, transparent: true, emissive: 0x332200});
            for(let i=0; i<10; i++) {
                const loaf = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.5, 0.5), mat);
                loaf.position.set((Math.random()-0.5)*70, 0.7, (Math.random()-0.5)*70);
                scene.add(loaf);
                artifacts.push(loaf);
            }
        }

        function triggerAnomaly() {
            const layer = document.getElementById('hallucination-layer');
            const scream = document.getElementById('scream-snd');
            
            // Галлюцинация на 15 секунд
            layer.style.opacity = "0.8"; // Яркая картинка
            marevoTarget = 5.0; 
            
            scream.currentTime = 0;
            scream.play().catch(() => {});

            setTimeout(() => {
                layer.style.opacity = "0";
                marevoTarget = 0;
            }, 15000); 
        }

        function setupControls() {
            const joy = document.getElementById('joystick-ui');
            const knob = document.getElementById('knob');
            let joyActive = false;
            let lastX, lastY;

            document.addEventListener('touchstart', e => {
                const t = e.touches[0];
                if(t.clientX < window.innerWidth / 2) joyActive = true;
                else { lastX = t.clientX; lastY = t.clientY; }
            }, {passive: false});

            document.addEventListener('touchmove', e => {
                const t = e.touches[0];
                if(t.clientX < window.innerWidth / 2 && joyActive) {
                    const rect = joy.getBoundingClientRect();
                    let dx = t.clientX - (rect.left + 50);
                    let dy = t.clientY - (rect.top + 50);
                    const d = Math.sqrt(dx*dx+dy*dy);
                    if(d > 40) { dx *= 40/d; dy *= 40/d; }
                    knob.style.transform = `translate(${dx}px, ${dy}px)`;
                    moveDir = {x: dx/40, y: dy/40};
                } else {
                    if(lastX !== undefined) {
                        rotation.y -= (t.clientX - lastX) * 0.006;
                        rotation.x -= (t.clientY - lastY) * 0.006;
                        rotation.x = Math.max(-Math.PI/3, Math.min(Math.PI/3, rotation.x));
                    }
                    lastX = t.clientX; lastY = t.clientY;
                }
            }, {passive: false});

            document.addEventListener('touchend', () => {
                joyActive = false; moveDir = {x:0, y:0};
                knob.style.transform = `translate(0,0)`;
                lastX = undefined;
            });
        }

        function showOverlay(title, text) {
            const over = document.getElementById('overlay');
            over.innerHTML = `<h1>${title}</h1><p>${text}</p><button onclick='location.reload()'>ЗАНОВО</button>`;
            over.style.display = 'flex';
        }

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('bg-music').play().catch(() => {});
            init();
        };

        window.addEventListener('resize', () => {
            if (camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
