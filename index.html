<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Золотой Батон: Изгнание</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #ffd700; font-size: 20px; z-index: 50; text-shadow: 2px 2px #000; pointer-events: none; }
        #joystick-ui { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 2px solid #ffd700; z-index: 60; }
        #knob { position: absolute; top: 30px; left: 30px; width: 40px; height: 40px; background: #ffd700; border-radius: 50%; opacity: 0.6; }
        
        /* Слой галлюцинаций */
        #hallucination-layer { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 40; 
            opacity: 0; 
            background-image: url('InShot_20260324_120003547');
            background-size: cover; 
            background-position: center; 
            transition: opacity 1.5s; 
            mix-blend-mode: color-dodge;
        }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        button { background: #440000; color: #ffd700; border: 1px solid #ffd700; padding: 15px 30px; font-size: 18px; cursor: pointer; margin-top: 20px; }
        
        /* Виньетка для усиления эффекта темноты */
        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 45;
            background: radial-gradient(circle, transparent 30%, black 100%);
        }
    </style>
</head>
<body>

    <div id="ui">АРТЕФАКТЫ: <span id="count">0</span> / 10</div>
    <div id="hallucination-layer"></div>
    <div id="vignette"></div>
    <div id="joystick-ui"><div id="knob"></div></div>

    <div id="overlay">
        <h1>ЗАТЕРЯННЫЙ В ДОМЕ</h1>
        <p>Найдите 10 батонов. Используйте фонарик, чтобы видеть во тьме.</p>
        <button id="start-btn">ВОЙТИ</button>
    </div>

    <audio id="bg-music" loop src="abandoned-prison.mp3"></audio>
    <audio id="scream-snd" src="Крик существа который зовет из подвала.mp3"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const textureLoader = new THREE.TextureLoader();
        
        const wallTex = textureLoader.load('5655360f-0c19-4fbd-9fdd-d7aa00d79c7e.jpeg');
        const floorTex = textureLoader.load('i (1).jpeg');
        const loafTex = textureLoader.load('InShot_20260324_114723215.png');
        const art1 = textureLoader.load('InShot_20260324_120048253.jpg');
        const art2 = textureLoader.load('InShot_20260324_120027115.jpg');

        let scene, camera, renderer, clock, marevoMat;
        let score = 0, artifacts = [], walls = [];
        let moveDir = { x: 0, y: 0 }, rotation = { x: 0, y: 0 };
        let marevoTarget = 0;
        let flashlight;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            scene.fog = new THREE.FogExp2(0x000000, 0.2); // Густой туман для темноты

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Пост-обработка: Марево
            const renderTarget = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
            const postScene = new THREE.Scene();
            const postCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            marevoMat = new THREE.ShaderMaterial({
                uniforms: { tDiffuse: {value: null}, time: {value: 0}, intensity: {value: 0} },
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
                fragmentShader: `
                    uniform sampler2D tDiffuse; uniform float time; uniform float intensity; varying vec2 vUv;
                    void main() {
                        vec2 uv = vUv;
                        if(intensity > 0.0) {
                            uv.x += sin(uv.y * 15.0 + time * 2.0) * 0.005 * intensity;
                            uv.y += cos(uv.x * 15.0 + time * 2.0) * 0.005 * intensity;
                        }
                        gl_FragColor = texture2D(tDiffuse, uv);
                    }
                `
            });
            postScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), marevoMat));

            clock = new THREE.Clock();
            
            // --- ФОНАРИК ---
            const ambient = new THREE.AmbientLight(0xffffff, 0.02); // Почти полная темнота
            scene.add(ambient);

            flashlight = new THREE.SpotLight(0xffffff, 2.5);
            flashlight.position.set(0, 0, 0);
            flashlight.angle = Math.PI / 8; // Узкий луч
            flashlight.penumbra = 0.3; // Мягкие края
            flashlight.decay = 2;
            flashlight.distance = 25;
            flashlight.castShadow = true;

            // Цель фонарика
            const flashlightTarget = new THREE.Object3D();
            flashlightTarget.position.set(0, 0, -1);
            camera.add(flashlightTarget);
            flashlight.target = flashlightTarget;

            camera.add(flashlight);
            scene.add(camera);

            // Пол
            floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
            floorTex.repeat.set(25, 25);
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100,100), new THREE.MeshStandardMaterial({map: floorTex}));
            floor.rotation.x = -Math.PI/2;
            floor.receiveShadow = true;
            scene.add(floor);

            createMaze();
            spawnItems();
            setupControls();

            function animate() {
                requestAnimationFrame(animate);
                const dt = clock.getDelta();
                const time = clock.getElapsedTime();

                // Плавное движение
                const speed = 4.5 * dt;
                const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
                forward.y = 0; right.y = 0;
                
                const nextPos = camera.position.clone();
                nextPos.addScaledVector(forward, -moveDir.y * speed);
                nextPos.addScaledVector(right, moveDir.x * speed);

                // Коллизии со стенами (упрощенно)
                let canMove = true;
                for(let w of walls) {
                    if(nextPos.distanceTo(w.position) < 2.0) { canMove = false; break; }
                }
                if(canMove) camera.position.copy(nextPos);

                camera.rotation.set(rotation.x, rotation.y, 0, 'YXZ');

                // Анимация и сбор батонов
                artifacts.forEach((a, i) => {
                    a.rotation.y += dt;
                    a.position.y = 0.7 + Math.sin(time * 2 + i) * 0.1;
                    if(camera.position.distanceTo(a.position) < 1.3) {
                        scene.remove(a);
                        artifacts.splice(i, 1);
                        score++;
                        document.getElementById('count').innerText = score;
                        if(score >= 10) {
                            document.getElementById('overlay').style.display = 'flex';
                            document.getElementById('overlay').innerHTML = "<h1>ПОБЕДА!</h1><p>Вы нашли все золотые батоны и вышли из дома.</p><button onclick='location.reload()'>ЗАНОВО</button>";
                        }
                    }
                });

                // Обновление шейдера марева
                marevoMat.uniforms.time.value = time;
                marevoMat.uniforms.intensity.value += (marevoTarget - marevoMat.uniforms.intensity.value) * 0.05;
                
                renderer.setRenderTarget(renderTarget);
                renderer.render(scene, camera);
                renderer.setRenderTarget(null);
                marevoMat.uniforms.tDiffuse.value = renderTarget.texture;
                renderer.render(postScene, postCam);
            }
            animate();
            setInterval(triggerAnomaly, 25000);
        }

        function createMaze() {
            const wallGeo = new THREE.BoxGeometry(4, 5, 0.5);
            const wallMat = new THREE.MeshStandardMaterial({map: wallTex});
            
            for(let i=0; i<45; i++) {
                const wall = new THREE.Mesh(wallGeo, wallMat);
                wall.position.set((Math.random()-0.5)*70, 2.5, (Math.random()-0.5)*70);
                wall.rotation.y = Math.random() > 0.5 ? 0 : Math.PI/2;
                wall.castShadow = true;
                wall.receiveShadow = true;
                
                if(wall.position.length() < 5) continue; // Не ставить стены на игрока в начале
                
                scene.add(wall);
                walls.push(wall);

                // Картины
                if(Math.random() > 0.6) {
                    const picGeo = new THREE.PlaneGeometry(1.5, 2);
                    const picMat = new THREE.MeshBasicMaterial({map: Math.random() > 0.5 ? art1 : art2});
                    const pic = new THREE.Mesh(picGeo, picMat);
                    pic.position.set(0, 0, 0.26);
                    wall.add(pic);
                }
            }
        }

        function spawnItems() {
            const mat = new THREE.MeshStandardMaterial({map: loafTex, transparent: true, emissive: 0x222200});
            for(let i=0; i<10; i++) {
                const loaf = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 0.5), mat);
                loaf.position.set((Math.random()-0.5)*60, 0.7, (Math.random()-0.5)*60);
                scene.add(loaf);
                artifacts.push(loaf);
            }
        }

        function triggerAnomaly() {
            const layer = document.getElementById('hallucination-layer');
            const scream = document.getElementById('scream-snd');
            
            layer.style.opacity = "0.5";
            marevoTarget = 4.0; 
            scream.play().catch(e => {});

            setTimeout(() => {
                layer.style.opacity = "0";
                marevoTarget = 0;
            }, 15000); 
        }

        function setupControls() {
            const joy = document.getElementById('joystick-ui');
            const knob = document.getElementById('knob');
            let active = false;
            let lastX, lastY;

            document.addEventListener('touchstart', e => {
                const t = e.touches[0];
                if(t.clientX < window.innerWidth/2) active = true;
                else {
                    lastX = t.clientX;
                    lastY = t.clientY;
                }
            });

            document.addEventListener('touchmove', e => {
                const t = e.touches[0];
                if(t.clientX < window.innerWidth/2 && active) {
                    const rect = joy.getBoundingClientRect();
                    let dx = t.clientX - (rect.left + 50);
                    let dy = t.clientY - (rect.top + 50);
                    const d = Math.sqrt(dx*dx+dy*dy);
                    if(d > 40) { dx *= 40/d; dy *= 40/d; }
                    knob.style.transform = `translate(${dx}px, ${dy}px)`;
                    moveDir = {x: dx/40, y: dy/40};
                } else {
                    if(lastX !== undefined) {
                        rotation.y -= (t.clientX - lastX) * 0.005;
                        rotation.x -= (t.clientY - lastY) * 0.005;
                        rotation.x = Math.max(-Math.PI/3, Math.min(Math.PI/3, rotation.x));
                    }
                    lastX = t.clientX;
                    lastY = t.clientY;
                }
            });

            document.addEventListener('touchend', () => {
                active = false; moveDir = {x:0, y:0};
                knob.style.transform = `translate(0,0)`;
                lastX = undefined;
            });
        }

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('bg-music').play().catch(e => {});
            init();
        };
    </script>
</body>
</html>
